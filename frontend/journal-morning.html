<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Life OS — Morning</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <a href="/" class="btn btn-secondary" style="padding:8px 14px;font-size:0.875rem">← Back</a>
  <h1>Morning Check-in</h1>
  <span class="journal-date" style="font-size:0.8rem;color:var(--text-dim)"></span>
</header>

<div class="container">

  <div class="card">
    <p style="font-size:0.875rem;color:var(--text-dim);margin-bottom:4px">
      Take 5 minutes to set your intentions for the day.
    </p>
    <p class="journal-date" style="font-size:0.875rem;color:var(--accent2)"></p>
  </div>

  <form id="journal-form" data-type="morning">

    <!-- Sleep -->
    <div class="card">
      <h2>Sleep & Energy</h2>
      <div class="field-row">
        <div class="field">
          <label for="sleep-hours">Hours of sleep</label>
          <input
            type="number"
            id="sleep-hours"
            inputmode="decimal"
            min="0"
            max="24"
            step="0.5"
            placeholder="7.5"
          >
        </div>
        <div class="field">
          <label for="mood-score">Morning mood: <strong id="mood-label">5</strong>/10</label>
          <input type="range" id="mood-score" min="1" max="10" value="5" step="1">
          <div class="range-labels"><span>1 — rough</span><span>10 — great</span></div>
        </div>
      </div>
    </div>

    <!-- Prompts -->
    <div class="card">
      <h2>Morning Prompts</h2>

      <div class="field">
        <label for="success">What would make today feel successful?</label>
        <textarea
          id="success"
          rows="3"
          placeholder="Finish the feature, clear my inbox, take a walk at lunch…"
          required
        ></textarea>
      </div>

      <div class="field">
        <label for="gratitude">What am I grateful for this morning?</label>
        <textarea
          id="gratitude"
          rows="3"
          placeholder="Good coffee, quiet morning, a clear head…"
          required
        ></textarea>
      </div>

      <div class="field">
        <label for="realistic-work">Given my energy, what kind of work is realistic today?</label>
        <textarea
          id="realistic-work"
          rows="3"
          placeholder="Deep focus for 90 min then lighter tasks, or mostly admin today…"
          required
        ></textarea>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="margin-bottom:24px">
      Save morning entry
    </button>

  </form>
</div>

<div id="toast"></div>

<script type="module">
  import "/js/journal.js";
  // Auth guard
  import { showSetupModal } from "/js/utils.js";
  if (!localStorage.getItem("life_os_api_key")) showSetupModal();
</script>

<!-- Minimal auth redirect fallback -->
<div id="setup-modal" class="hidden">
  <div class="modal-box">
    <h2>API key required</h2>
    <p>Go back to the <a href="/" style="color:var(--accent)">home page</a> to set up your API key.</p>
  </div>
</div>

</body>
</html>
