events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ---- HTTP → HTTPS redirect ----
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS ----
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'" always;
        add_header Permissions-Policy "push=(), geolocation=()" always;

        # Serve frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # API proxy — strip /api prefix before forwarding
        location /api/ {
            proxy_pass         http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            # Don't buffer API responses (important for streaming if added later)
            proxy_buffering    off;
        }

        # Service worker must be served from root scope
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
        }

        # Frontend SPA routing — serve index.html for unknown paths
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively (versioned via sw.js cache key)
        location ~* \.(css|js|png|ico|json)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
    }
}
