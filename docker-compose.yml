services:

  backend:
    build: ./backend
    environment:
      API_KEY: ${API_KEY}
      VAULT_DIR: /app/vault
      CONFIG_DIR: /app/config
      TZ: ${TZ:-America/New_York}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_CALENDAR_IDS: ${GOOGLE_CALENDAR_IDS:-primary}
      GOOGLE_CALENDAR_WRITE_ID: ${GOOGLE_CALENDAR_WRITE_ID:-primary}
    volumes:
      # vault/ is a host bind mount — data persists independent of containers
      - ./vault:/app/vault
      - ./config:/app/config
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certs: place fullchain.pem and privkey.pem here (gitignored)
      - ./nginx/certs:/etc/nginx/certs:ro
      # Frontend files served as static (read-only)
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build: ./backend
    # Override CMD to run crond in foreground
    command: crond -f -l 8
    environment:
      API_KEY: ${API_KEY}
      VAULT_DIR: /app/vault
      CONFIG_DIR: /app/config
      TZ: ${TZ:-America/New_York}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-}
    volumes:
      # Same host directories — cron writes to the same vault as the backend
      - ./vault:/app/vault
      - ./config:/app/config
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
