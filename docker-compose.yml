services:

  backend:
    build: ./backend
    environment:
      API_KEY: ${API_KEY}
      VAULT_DIR: /app/vault
      CONFIG_DIR: /app/config
      FRONTEND_DIR: /app/frontend
      TZ: ${TZ:-America/New_York}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_CALENDAR_IDS: ${GOOGLE_CALENDAR_IDS:-primary}
      GOOGLE_CALENDAR_WRITE_ID: ${GOOGLE_CALENDAR_WRITE_ID:-primary}
    volumes:
      # vault/ is a host bind mount — data persists independent of containers
      - ./vault:/app/vault
      - ./config:/app/config
      # Frontend static files served directly by FastAPI (no nginx needed)
      - ./frontend:/app/frontend:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Cloudflare Tunnel — outbound only, no open inbound ports required.
  #
  # Setup (one-time, in Cloudflare Zero Trust dashboard):
  #   1. Networks → Tunnels → Create tunnel → Cloudflared
  #   2. Copy the tunnel token into your .env as CLOUDFLARE_TUNNEL_TOKEN
  #   3. Add a Public Hostname:
  #        Subdomain: lifeos (or whatever)
  #        Domain:    yourdomain.com
  #        Service:   http://backend:8000
  #   4. Save — Cloudflare handles TLS automatically (no certs to manage)
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build: ./backend
    command: crond -f -l 8
    environment:
      API_KEY: ${API_KEY}
      VAULT_DIR: /app/vault
      CONFIG_DIR: /app/config
      TZ: ${TZ:-America/New_York}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-}
    volumes:
      - ./vault:/app/vault
      - ./config:/app/config
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
